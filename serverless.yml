# Daily HR batch — deploy-time cron is UTC. Default matches 8:01 AM Asia/Kolkata (IST = UTC+5:30 → 02:31 UTC).
# Set SCHEDULE_CRON when deploying if you change BATCH_HOUR/BATCH_MINUTE. See README.
# Loads `.env` from project root when you run `serverless deploy` (do not commit secrets).
useDotenv: true

service: batch-hr-portal

frameworkVersion: "3"

provider:
  name: aws
  runtime: nodejs20.x
  stage: ${opt:stage, 'dev'}
  region: ${env:AWS_REGION, 'ap-south-1'}
  memorySize: 256
  timeout: 120
  environment:
    NODE_ENV: production
    DATABASE_URL: ${env:DATABASE_URL, ''}
    # AWS_REGION is reserved — Lambda sets it automatically; do not declare it here.
    APP_TIMEZONE: ${env:APP_TIMEZONE, 'Asia/Kolkata'}
    SYSTEM_USER_ID: ${env:SYSTEM_USER_ID, ''}
    SES_FROM_EMAIL: ${env:SES_FROM_EMAIL, ''}
    SES_FROM_NAME: ${env:SES_FROM_NAME, 'HR Batch'}
    SES_NOTIFICATION_TO: ${env:SES_NOTIFICATION_TO, ''}
    SES_REPLY_TO: ${env:SES_REPLY_TO, ''}
    SES_CONFIGURATION_SET: ${env:SES_CONFIGURATION_SET, ''}
    LEAVE_ACCRUAL_AMOUNT: ${env:LEAVE_ACCRUAL_AMOUNT, '1.5'}
    BATCH_HOUR: ${env:BATCH_HOUR, '8'}
    BATCH_MINUTE: ${env:BATCH_MINUTE, '1'}
    ACTIVE_EMPLOYEE_STATUSES: ${env:ACTIVE_EMPLOYEE_STATUSES, ''}
    INACTIVE_EMPLOYEE_STATUSES: ${env:INACTIVE_EMPLOYEE_STATUSES, 'INACTIVE'}
    LEAVE_YEAR_LOOKUP_MODE: ${env:LEAVE_YEAR_LOOKUP_MODE, ''}
    CURRENT_LEAVE_YEAR_ID: ${env:CURRENT_LEAVE_YEAR_ID, ''}
    LEAVE_YEAR_TABLE: ${env:LEAVE_YEAR_TABLE, ''}
    LEAVE_YEAR_ID_COLUMN: ${env:LEAVE_YEAR_ID_COLUMN, ''}
    LEAVE_YEAR_START_COLUMN: ${env:LEAVE_YEAR_START_COLUMN, ''}
    LEAVE_YEAR_END_COLUMN: ${env:LEAVE_YEAR_END_COLUMN, ''}
    LOG_LEVEL: ${env:LOG_LEVEL, 'info'}
    # Omit or set true in Lambda; use false only if DB TLS needs it (prefer RDS CA in prod)
    DATABASE_SSL_REJECT_UNAUTHORIZED: ${env:DATABASE_SSL_REJECT_UNAUTHORIZED, 'true'}
    # Leave empty: non-localhost URLs use TLS (required for most RDS). Set false only for special local DBs.
    DATABASE_USE_SSL: ${env:DATABASE_USE_SSL, ''}
    # Base URL for email template images (contents of public/ folder uploaded to S3 / CDN).
    # Leave empty to use inline SVG fallbacks. See .env.example for setup instructions.
    CELEBRATION_ASSET_BASE_URL: ${env:CELEBRATION_ASSET_BASE_URL, ''}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - ses:SendEmail
            - ses:SendRawEmail
          Resource: "*"

plugins:
  - serverless-esbuild

custom:
  esbuild:
    bundle: true
    platform: node
    target: node20
    format: cjs
    sourcemap: true

package:
  individually: true

functions:
  dailyBatch:
    handler: src/handler.handler
    events:
      - schedule: ${env:SCHEDULE_CRON, 'cron(31 2 * * ? *)'}
